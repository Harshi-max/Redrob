methodology_summary: >
  A hybrid, offline-first candidate discovery system. Uses BM25 lexical search and FAISS-based BGE-M3 dense vector search combined via Reciprocal Rank Fusion (RRF, K=60) for high recall, followed by timeline-based honeypot filtration. Retained candidates are scored via a multi-dimensional feature model (technical, experience, behavioral, location) and blended with DeepSeek-v4-flash re-ranking (40% weight) of the top 500. Final rankings are sorted and percentile-normalized into NDCG-optimized relevance tiers.
